<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Get Started Free - Butter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/motion@11.11.13/dist/motion.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            yellow: '#FFF584',
                            lavender: '#C9CFFE',
                            mint: '#A5EFD3',
                            peach: '#FEE0B2',
                            pink: '#F9D8D2',
                            dark: '#1B1C33'
                        }
                    },
                    fontFamily: {
                        display: ['Sora', 'sans-serif'],
                        body: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-display { font-family: 'Sora', sans-serif; }
        .shadow-playful { box-shadow: 4px 4px 0px 0px rgba(27,28,51,1); }
        .shadow-playful-hover:hover { box-shadow: 6px 6px 0px 0px rgba(27,28,51,1); transform: translate(-2px, -2px); }
        .input-neo { @apply w-full p-4 border-2 border-brand-dark rounded-xl focus:outline-none focus:ring-4 focus:ring-brand-pink/50 transition-all; }
    </style>
</head>
<body class="bg-brand-mint text-brand-dark min-h-screen flex flex-col items-center justify-center p-6 lg:p-12 relative overflow-hidden">

    <!-- DECORATIVE CONFETTI BACKGROUND -->
    <div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10">
        <div class="absolute top-[10%] left-[5%] w-4 h-4 bg-brand-pink rounded-full dec-float"></div>
        <div class="absolute top-[15%] right-[15%] w-6 h-6 bg-brand-yellow rounded border border-brand-dark rotate-45 dec-float delay-100"></div>
        <div class="absolute bottom-[20%] left-[20%] w-8 h-8 bg-brand-lavender rounded-lg border-2 border-brand-dark dec-float delay-200"></div>
        <div class="absolute bottom-[10%] right-[10%] w-5 h-5 bg-brand-peach rounded-full border border-brand-dark dec-float delay-300"></div>
        
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-white opacity-40 blur-3xl rounded-full"></div>
    </div>

    <!-- NAVIGATION - MINIMAL -->
    <nav class="absolute top-0 w-full p-6 z-50 flex justify-between items-center max-w-7xl mx-auto left-0 right-0">
        <a href="index.html" class="flex items-center space-x-2 font-display font-bold text-2xl tracking-tight">
            <span class="w-8 h-8 rounded-full bg-brand-dark flex items-center justify-center text-brand-yellow text-sm">B</span>
            <span>Butter</span>
        </a>
        <a href="login.html" class="hidden md:block font-bold hover:text-black">Log in</a>
    </nav>

    <div class="w-full max-w-xl bg-white border-2 border-brand-dark rounded-[2.5rem] p-8 lg:p-12 shadow-[12px_12px_0px_0px_rgba(27,28,51,1)] relative js-animate-form z-10 my-16" style="opacity: 0;">
        <div class="flex justify-center mb-6">
            <div class="bg-brand-pink p-4 rounded-3xl border-2 border-brand-dark shadow-playful rotate-neg-2">
                <i data-lucide="sparkles" class="w-8 h-8 text-brand-dark"></i>
            </div>
        </div>
        <h1 class="font-display text-4xl lg:text-5xl font-bold mb-4 text-center tracking-tight">Join the club 🚀</h1>
        <p class="text-brand-dark/70 text-center mb-10 font-medium text-lg max-w-sm mx-auto">Join 150,000+ facilitators running sessions people actually enjoy.</p>

        <form class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block font-bold mb-2 text-sm uppercase tracking-wide text-brand-dark/80" for="firstname">First Name</label>
                    <input type="text" id="firstname" class="input-neo" placeholder="Alex">
                </div>
                <div>
                    <label class="block font-bold mb-2 text-sm uppercase tracking-wide text-brand-dark/80" for="lastname">Last Name</label>
                    <input type="text" id="lastname" class="input-neo" placeholder="Morgan">
                </div>
            </div>
            
            <div>
                <label class="block font-bold mb-2 text-sm uppercase tracking-wide text-brand-dark/80" for="email">Work Email</label>
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-brand-dark/50"></i>
                    <input type="email" id="email" class="input-neo pl-12" placeholder="alex@company.com">
                </div>
            </div>
            
            <div>
                <label class="block font-bold mb-2 text-sm uppercase tracking-wide text-brand-dark/80" for="password">Password</label>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-brand-dark/50"></i>
                    <input type="password" id="password" class="input-neo pl-12" placeholder="Min. 8 characters">
                </div>
            </div>

            <a href="dashboard.html" class="w-full bg-brand-pink border-2 border-brand-dark rounded-xl py-4 mt-8 font-display font-bold text-xl shadow-[4px_4px_0px_0px_rgba(27,28,51,1)] hover:translate-y-0.5 hover:shadow-[2px_2px_0px_0px_rgba(27,28,51,1)] transition-all flex items-center justify-center space-x-2">
                <span>Create account</span>
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </a>

            <!-- Google Authentication Option -->
            <button type="button" class="w-full bg-white border-2 border-brand-dark rounded-xl py-4 font-bold text-md shadow-[4px_4px_0px_0px_rgba(27,28,51,1)] hover:translate-y-0.5 hover:shadow-[2px_2px_0px_0px_rgba(27,28,51,1)] transition-all flex items-center justify-center space-x-3 mt-4">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span>Continue with Google</span>
            </button>
        </form>

        <div class="mt-8 text-center text-sm font-medium text-brand-dark/80 bg-gray-50 -mx-8 lg:-mx-12 -mb-8 lg:-mb-12 p-6 rounded-b-[2.5rem] border-t-2 border-brand-dark/10">
            By signing up, you agree to our <a href="#" class="underline font-bold hover:text-brand-dark">Terms</a> and <a href="#" class="underline font-bold hover:text-brand-dark">Privacy Policy</a>.
            <div class="mt-2 md:hidden block">
                <p>Already have an account? <a href="login.html" class="font-bold underline text-brand-dark">Log in</a></p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        document.addEventListener('DOMContentLoaded', () => {
            const { animate, stagger } = Motion;
            // Form enter animation
            animate(".js-animate-form", { opacity: 1, scale: [0.95, 1], y: [40, 0] }, { duration: 0.6, easing: [0.17, 0.55, 0.55, 1] });
            
            // Background elements float animation
            animate(".dec-float", { opacity: [0, 1], scale: [0.5, 1] }, { duration: 0.8, delay: stagger(0.15), easing: "easeOut" });

            setTimeout(() => {
                animate(".dec-float", { y: ["-15px", "15px", "-15px"], rotate: [0, 10, -10, 0] }, { duration: 5, repeat: Infinity, ease: "easeInOut" });
            }, 1000);
        });
    </script>
</body>
</html>
